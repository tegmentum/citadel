# Prometheus scraping the Citadel control-plane /metrics exporter + the alert
# rules. (The /metrics HTTP endpoint is served by the control-plane server binary
# wiring citadel-metrics-exporter::render — see README.)
global:
  scrape_interval: 15s
rule_files:
  - /etc/prometheus/rules/citadel-alerts.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
scrape_configs:
  - job_name: citadel
    static_configs:
      - targets: ['citadel-control-plane:9100']
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:9464']
