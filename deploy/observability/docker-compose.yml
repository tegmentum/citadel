# The Citadel observability stack: Prometheus (scrape + alert), Alertmanager,
# Grafana (dashboards), and the OTel Collector. Point the `citadel` scrape job at
# your control-plane /metrics endpoint (citadel-metrics-exporter::render).
services:
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules:/etc/prometheus/rules:ro
    ports: ["9090:9090"]
  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./alertmanager-rules/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports: ["9093:9093"]
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./grafana-dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
  otel-collector:
    image: otel/opentelemetry-collector:0.103.1
    command: ["validate", "--config", "/etc/otelcol/collector.yaml"]
    volumes:
      - ./otel-collector-config/collector.yaml:/etc/otelcol/collector.yaml:ro
