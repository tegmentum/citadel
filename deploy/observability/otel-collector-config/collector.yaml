# OTel Collector: scrape the Citadel control-plane /metrics, enrich with cluster
# identity, and fan out to Prometheus (and any OTLP backend). The spine of the
# observability pipeline (OBS5 §6).
receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: citadel
          scrape_interval: 15s
          static_configs:
            - targets: ['citadel-control-plane:9100']
processors:
  resource:
    attributes:
      - key: citadel.cluster.id
        value: citadel-local
        action: upsert
  batch: {}
exporters:
  prometheus:
    endpoint: '0.0.0.0:9464'
  debug:
    verbosity: normal
service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [resource, batch]
      exporters: [prometheus, debug]
