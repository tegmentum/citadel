# OBS5 full pipeline: scrape Citadel /metrics + receive OTLP, enrich with cluster
# identity, and fan out to long-term backends — Mimir/Thanos (metrics via
# remote_write), Tempo (traces), Loki (logs). Uses the contrib distribution
# (prometheusremotewrite + the OTLP/HTTP exporters).
receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: citadel
          scrape_interval: 15s
          static_configs:
            - targets: ['citadel-control-plane:9100']
  otlp:
    protocols:
      http: { endpoint: 0.0.0.0:4318 }
      grpc: { endpoint: 0.0.0.0:4317 }
processors:
  resource:
    attributes:
      - { key: citadel.cluster.id, value: citadel-local, action: upsert }
  batch: {}
exporters:
  prometheusremotewrite:        # -> Mimir / Thanos receive
    endpoint: http://mimir:9009/api/v1/push
  otlp/tempo:                   # -> Tempo (traces)
    endpoint: tempo:4317
    tls: { insecure: true }
  otlphttp/loki:                # -> Loki (logs, native OTLP)
    endpoint: http://loki:3100/otlp
service:
  pipelines:
    metrics: { receivers: [prometheus, otlp], processors: [resource, batch], exporters: [prometheusremotewrite] }
    traces:  { receivers: [otlp], processors: [resource, batch], exporters: [otlp/tempo] }
    logs:    { receivers: [otlp], processors: [resource, batch], exporters: [otlphttp/loki] }
