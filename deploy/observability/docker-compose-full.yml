# OBS5 long-term stack (LGTM): Mimir (metrics), Tempo (traces), Loki (logs),
# Grafana (provisioned datasources), and the full Collector. Backends run with
# their stock single-binary configs; the validated Citadel piece is
# collector-full.yaml. Point the collector's `citadel` scrape job at your
# control-plane /metrics.
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    command: ["--config", "/etc/otelcol/collector-full.yaml"]
    volumes:
      - ./otel-collector-config/collector-full.yaml:/etc/otelcol/collector-full.yaml:ro
    ports: ["4317:4317", "4318:4318"]
  mimir:
    image: grafana/mimir:2.13.0
    command: ["-config.file=/etc/mimir/demo.yaml", "-target=all"]
    ports: ["9009:9009"]
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports: ["3200:3200", "4417:4317"]
  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports: ["3100:3100"]
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/citadel.yaml:ro
      - ./grafana-dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
