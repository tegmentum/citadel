# SPIRE server configured to load the Citadel NodeAttestor as an external
# go-plugin. `plugin_cmd` is the path to the citadel-spire-plugin binary (a Linux
# build, mounted into the container — see docker-compose.yml).
server {
    bind_address   = "0.0.0.0"
    bind_port      = "8081"
    trust_domain   = "citadel.local"
    data_dir       = "/opt/spire/data"
    log_level      = "DEBUG"
    ca_subject {
        common_name = "citadel"
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type     = "sqlite3"
            connection_string = "/opt/spire/data/datastore.sqlite3"
        }
    }

    KeyManager "memory" {
        plugin_data {}
    }

    # The Citadel trust gate. SPIRE launches this external plugin; it returns an
    # agent identity + citadel: selectors only for nodes the mesh currently
    # Verifies, and denies otherwise (so SVIDs are not issued/renewed).
    NodeAttestor "citadel" {
        plugin_cmd = "/opt/citadel/citadel-spire-plugin"
        plugin_data {}
    }
}
