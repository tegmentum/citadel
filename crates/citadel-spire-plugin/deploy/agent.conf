# SPIRE agent loading the Citadel agent-side NodeAttestor (the pair's other half).
# Pairs with server.conf's NodeAttestor "citadel". The agent plugin emits this
# node's payload (CITADEL_NODE_ID); the server plugin verifies it against mesh
# trust.
agent {
    data_dir           = "/opt/spire/data/agent"
    log_level          = "DEBUG"
    server_address     = "spire-server"
    server_port        = "8081"
    trust_domain       = "citadel.local"
    insecure_bootstrap = true
}
plugins {
    NodeAttestor "citadel" {
        plugin_cmd = "/opt/citadel/citadel-spire-agent-plugin"
        plugin_data {}
    }
    KeyManager "memory" { plugin_data {} }
    WorkloadAttestor "unix" { plugin_data {} }
}
