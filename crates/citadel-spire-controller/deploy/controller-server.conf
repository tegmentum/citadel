# Minimal SPIRE server for exercising the Citadel registration controller against
# the Entry API. Uses the built-in join_token NodeAttestor (no external plugin),
# so the server starts cleanly and serves its local admin API socket.
server {
    bind_address = "0.0.0.0"
    bind_port    = "8081"
    trust_domain = "citadel.local"
    data_dir     = "/opt/spire/data"
    log_level    = "INFO"
    ca_subject { common_name = "citadel" }
}
plugins {
    DataStore "sql" {
        plugin_data {
            database_type     = "sqlite3"
            connection_string = "/opt/spire/data/datastore.sqlite3"
        }
    }
    KeyManager "memory" { plugin_data {} }
    NodeAttestor "join_token" { plugin_data {} }
}
